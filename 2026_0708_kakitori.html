  <div class="app">
    <header><div class="title"><div class="mascot" aria-hidden="true">✏️</div><div><h1>漢字 書き取りれんしゅう</h1><div class="subtitle">10問ずつ、書いて、見くらべて、覚えよう</div></div></div><button class="small-button" id="homeButton" type="button">メニュー</button></header>

      <div class="screen" id="practiceScreen"><div class="status"><div class="status-row"><span id="progressText">0 / 10</span><span id="queueText">のこり 10問</span></div><div class="bar-wrap" aria-hidden="true"><div class="bar" id="bar"></div></div></div><main class="practice-main"><div class="question-label" id="questionNumber">もんだい</div><div class="question" id="questionText"></div><div class="canvas-shell" id="canvasShell"><div class="guide-answer" id="guideAnswer"></div><canvas id="writingCanvas" aria-label="手書きエリア"></canvas></div><div class="tools"><button class="tool-button" id="undoButton" type="button">一つもどす</button><button class="tool-button danger" id="clearButton" type="button">消す</button><button class="tool-button" id="hintButton" type="button">うすくお手本</button><button class="tool-button main" id="showAnswerButton" type="button">答えを見る</button></div><div class="answer-panel" id="answerPanel"><div class="answer-title">正解</div><div class="answer-big" id="answerBig"></div><div class="judge-buttons"><button class="judge good" id="judgeGood" type="button">できた！</button><button class="judge close" id="judgeClose" type="button">おしい</button><button class="judge retry" id="judgeRetry" type="button">もう一回</button></div></div><div class="message" id="message">読みがなを見て、手で書いてみよう。</div></main></div>
      <div class="screen" id="summaryScreen"><div class="summary"><h2 id="summaryTitle">クリア！</h2><p id="summaryText">10問おつかれさま。</p><div class="summary-stats"><div class="stat"><span class="stat-num" id="statDone">10</span><span class="stat-label">できた</span></div><div class="stat"><span class="stat-num" id="statClose">0</span><span class="stat-label">おしい</span></div><div class="stat"><span class="stat-num" id="statRetry">0</span><span class="stat-label">もう一回</span></div></div><div class="list-box hidden" id="reviewBox"><h3>あとでまた練習したい漢字</h3><div class="kanji-tags" id="reviewTags"></div></div><div class="home-actions" style="justify-content:center;"><button class="big-action blue" id="nextStageButton" type="button">つぎの10問</button><button class="big-action" id="repeatStageButton" type="button">同じ10問をもう一回</button><button class="big-action white" id="backHomeButton" type="button">メニューへ</button></div></div></div>

<script>

const STORAGE_KEY="kanjiWritingPractice_v1",STAGE_SIZE=10,TOTAL=QUESTIONS.length;let records=loadRecords();let session={title:"",originalIds:[],queue:[],doneIds:new Set(),current:null,results:{},mode:"stage",stageIndex:0};let strokes=[],currentStroke=null,isDrawing=false,hintVisible=false;
const screens={home:document.getElementById("homeScreen"),practice:document.getElementById("practiceScreen"),summary:document.getElementById("summaryScreen")};
const stageGrid=document.getElementById("stageGrid"),homeButton=document.getElementById("homeButton"),random10Button=document.getElementById("random10Button"),all50Button=document.getElementById("all50Button"),resetProgressButton=document.getElementById("resetProgressButton"),progressText=document.getElementById("progressText"),queueText=document.getElementById("queueText"),bar=document.getElementById("bar"),questionNumber=document.getElementById("questionNumber"),questionText=document.getElementById("questionText"),canvasShell=document.getElementById("canvasShell"),canvas=document.getElementById("writingCanvas"),ctx=canvas.getContext("2d"),guideAnswer=document.getElementById("guideAnswer"),undoButton=document.getElementById("undoButton"),clearButton=document.getElementById("clearButton"),hintButton=document.getElementById("hintButton"),showAnswerButton=document.getElementById("showAnswerButton"),answerPanel=document.getElementById("answerPanel"),answerBig=document.getElementById("answerBig"),messageEl=document.getElementById("message"),judgeGood=document.getElementById("judgeGood"),judgeClose=document.getElementById("judgeClose"),judgeRetry=document.getElementById("judgeRetry"),summaryTitle=document.getElementById("summaryTitle"),summaryText=document.getElementById("summaryText"),statDone=document.getElementById("statDone"),statClose=document.getElementById("statClose"),statRetry=document.getElementById("statRetry"),reviewBox=document.getElementById("reviewBox"),reviewTags=document.getElementById("reviewTags"),nextStageButton=document.getElementById("nextStageButton"),repeatStageButton=document.getElementById("repeatStageButton"),backHomeButton=document.getElementById("backHomeButton");
function loadRecords(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")||{}}catch{return{}}}function saveRecords(){localStorage.setItem(STORAGE_KEY,JSON.stringify(records))}function ensureRecord(id){return records[id]||(records[id]={good:0,close:0,retry:0,last:""})}function shuffle(array){const a=array.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function byId(id){return QUESTIONS.find(q=>q.id===id)}function showScreen(name){Object.values(screens).forEach(s=>s.classList.remove("active"));screens[name].classList.add("active");if(name==="practice")setTimeout(resizeCanvas,30)}
function renderHome(){stageGrid.innerHTML="";const stageCount=Math.ceil(TOTAL/STAGE_SIZE);for(let i=0;i<stageCount;i++){const start=i*STAGE_SIZE+1,end=Math.min((i+1)*STAGE_SIZE,TOTAL),ids=QUESTIONS.slice(i*STAGE_SIZE,end).map(q=>q.id),goodCount=ids.filter(id=>records[id]&&records[id].last==="good").length,needsReview=ids.filter(id=>records[id]&&(records[id].last==="close"||records[id].last==="retry")).length;const button=document.createElement("button");button.className="stage-button";button.type="button";button.innerHTML=`<span class="stage-title">ステージ ${i+1}</span><span class="stage-sub">問題 ${start}〜${end} の10問</span><span class="stage-progress">できた ${goodCount}/${ids.length}　復習 ${needsReview}</span>`;button.addEventListener("click",()=>startStage(i));stageGrid.appendChild(button)}}
function startStage(stageIndex){const startIndex=stageIndex*STAGE_SIZE,qs=QUESTIONS.slice(startIndex,startIndex+STAGE_SIZE);startSession({title:`ステージ ${stageIndex+1}`,ids:qs.map(q=>q.id),mode:"stage",stageIndex})}function startRandom10(){startSession({title:"ランダム10問",ids:shuffle(QUESTIONS).slice(0,STAGE_SIZE).map(q=>q.id),mode:"random",stageIndex:0})}function startAll50(){startSession({title:"ランダム50問",ids:QUESTIONS.map(q=>q.id),mode:"all",stageIndex:0})}
function startSession({title,ids,mode,stageIndex}){session={title,originalIds:ids.slice(),queue:mode==="stage"?ids.slice():shuffle(ids.slice()),doneIds:new Set(),current:null,results:{},mode,stageIndex};showScreen("practice");message(`今日は「${title}」。書いたら答えを見て、自分で丸つけしよう。`,"");showNextQuestion()}function updateStatus(){const total=session.originalIds.length,done=session.doneIds.size;progressText.textContent=`${session.title}：できた ${done} / ${total}`;queueText.textContent=`のこり ${Math.max(total-done,0)}問`;bar.style.width=`${total?(done/total)*100:0}%`}
function showNextQuestion(){if(session.doneIds.size>=session.originalIds.length){showSummary();return}let nextId=session.queue.shift();while(nextId&&session.doneIds.has(nextId))nextId=session.queue.shift();if(!nextId){const rest=session.originalIds.filter(id=>!session.doneIds.has(id));session.queue=session.mode==="stage"?rest:shuffle(rest);nextId=session.queue.shift()}session.current=byId(nextId);questionNumber.textContent=`もんだい ${session.current.id}`;questionText.innerHTML=session.current.prompt;answerBig.textContent=session.current.answer;guideAnswer.textContent=session.current.answer;setGuideFontSize(session.current.answer);answerPanel.classList.remove("show");hintVisible=false;guideAnswer.classList.remove("show");hintButton.textContent="うすくお手本";clearCanvas();updateStatus()}function showAnswer(){if(!session.current)return;answerPanel.classList.add("show");message("書いた字と正解を見くらべて、近いボタンをえらんでね。","warn")}
function judge(kind){if(!session.current)return;const id=session.current.id,rec=ensureRecord(id);rec[kind]++;rec.last=kind;saveRecords();session.results[id]=kind;if(kind==="good"){session.doneIds.add(id);message("いいね。これはクリア！","good")}else if(kind==="close"){session.queue.push(id);message("おしい。あとでもう一回だけ出るよ。","warn")}else{session.queue.push(id);message("だいじょうぶ。あとでもう一回れんしゅうしよう。","bad")}updateStatus();setTimeout(showNextQuestion,kind==="good"?500:850)}
function showSummary(){const vals=Object.values(session.results),good=vals.filter(v=>v==="good").length,close=vals.filter(v=>v==="close").length,retry=vals.filter(v=>v==="retry").length;summaryTitle.textContent=`${session.title} クリア！`;summaryText.textContent=session.originalIds.length===50?"50問ぶん、よくがんばりました。":"10問ぶんの練習、おつかれさま。今日はここまででも十分です。";statDone.textContent=good;statClose.textContent=close;statRetry.textContent=retry;const reviewIds=session.originalIds.filter(id=>{const r=records[id];return r&&(r.last==="close"||r.last==="retry")});reviewTags.innerHTML="";if(reviewIds.length){reviewBox.classList.remove("hidden");for(const id of reviewIds){const q=byId(id),tag=document.createElement("span");tag.className="tag";tag.textContent=`${q.answer}`;reviewTags.appendChild(tag)}}else reviewBox.classList.add("hidden");const maxStageIndex=Math.ceil(TOTAL/STAGE_SIZE)-1;if(session.mode==="stage"&&session.stageIndex<maxStageIndex){nextStageButton.classList.remove("hidden");nextStageButton.textContent="つぎの10問"}else nextStageButton.classList.add("hidden");showScreen("summary");renderHome()}
function setGuideFontSize(answer){const len=Array.from(answer).length;let size="min(31vh,270px)";if(len===2)size="min(24vh,210px)";else if(len===3)size="min(17vh,155px)";else if(len>=4)size="min(13vh,120px)";guideAnswer.style.fontSize=size;guideAnswer.style.padding="22px";guideAnswer.style.lineHeight="0.95";guideAnswer.style.whiteSpace="nowrap";}function resizeCanvas(){const rect=canvasShell.getBoundingClientRect(),dpr=Math.max(window.devicePixelRatio||1,1),old=strokes.slice();canvas.width=Math.floor(rect.width*dpr);canvas.height=Math.floor(rect.height*dpr);canvas.style.width=`${rect.width}px`;canvas.style.height=`${rect.height}px`;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#1f1b16";ctx.lineWidth=7;strokes=old;redraw()}function getPoint(e){const rect=canvas.getBoundingClientRect();return{x:e.clientX-rect.left,y:e.clientY-rect.top}}function startDraw(e){e.preventDefault();isDrawing=true;currentStroke=[getPoint(e)];canvas.setPointerCapture(e.pointerId)}function moveDraw(e){if(!isDrawing||!currentStroke)return;e.preventDefault();const p=getPoint(e);currentStroke.push(p);drawStrokeSegment(currentStroke[currentStroke.length-2],p)}function endDraw(e){if(!isDrawing||!currentStroke)return;e.preventDefault();isDrawing=false;if(currentStroke.length>0)strokes.push(currentStroke);currentStroke=null;try{canvas.releasePointerCapture(e.pointerId)}catch{}}function drawStrokeSegment(a,b){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}function redraw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();const dpr=Math.max(window.devicePixelRatio||1,1);ctx.setTransform(dpr,0,0,dpr,0,0);ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#1f1b16";ctx.lineWidth=7;for(const stroke of strokes){if(stroke.length===1){const p=stroke[0];ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle="#1f1b16";ctx.fill();continue}ctx.beginPath();ctx.moveTo(stroke[0].x,stroke[0].y);for(let i=1;i<stroke.length;i++)ctx.lineTo(stroke[i].x,stroke[i].y);ctx.stroke()}ctx.restore()}function clearCanvas(){strokes=[];currentStroke=null;isDrawing=false;redraw()}function undoStroke(){strokes.pop();redraw()}function toggleHint(){hintVisible=!hintVisible;guideAnswer.classList.toggle("show",hintVisible);hintButton.textContent=hintVisible?"お手本を消す":"うすくお手本"}function message(text,type){messageEl.textContent=text;messageEl.className="message";if(type)messageEl.classList.add(type)}
function goHome(){renderHome();showScreen("home")}homeButton.addEventListener("click",goHome);homeButton.addEventListener("pointerup",e=>{e.preventDefault();goHome()});random10Button.addEventListener("click",startRandom10);all50Button.addEventListener("click",startAll50);resetProgressButton.addEventListener("click",()=>{if(!confirm("これまでの記録を消しますか？"))return;records={};saveRecords();renderHome()});undoButton.addEventListener("click",undoStroke);clearButton.addEventListener("click",clearCanvas);hintButton.addEventListener("click",toggleHint);showAnswerButton.addEventListener("click",showAnswer);judgeGood.addEventListener("click",()=>judge("good"));judgeClose.addEventListener("click",()=>judge("close"));judgeRetry.addEventListener("click",()=>judge("retry"));nextStageButton.addEventListener("click",()=>startStage(session.stageIndex+1));repeatStageButton.addEventListener("click",()=>startSession({title:session.title,ids:session.originalIds,mode:session.mode,stageIndex:session.stageIndex}));backHomeButton.addEventListener("click",()=>{renderHome();showScreen("home")});canvas.addEventListener("pointerdown",startDraw);canvas.addEventListener("pointermove",moveDraw);canvas.addEventListener("pointerup",endDraw);canvas.addEventListener("pointercancel",endDraw);window.addEventListener("resize",resizeCanvas);renderHome();resizeCanvas();
</script>
