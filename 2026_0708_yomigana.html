<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3年生 漢字えらびクイズ</title>
  <style>
    :root {
      --bg: #fff8e8;
      --card: #ffffff;
      --ink: #2f2a24;
      --muted: #6c6258;
      --line: #eadfcf;
      --accent: #ffb74d;
      --accent-strong: #f08c00;
      --good: #2e9d61;
      --bad: #d64545;
      --choice: #fff1cc;
      --choice-border: #f1c46b;
      --reading-bg: #fff7dc;
      --reading-border: #f2b94b;
      --shadow: 0 14px 34px rgba(103, 74, 29, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 214, 102, 0.42), transparent 30%),
        radial-gradient(circle at 90% 18%, rgba(144, 202, 249, 0.35), transparent 28%),
        radial-gradient(circle at 18% 88%, rgba(129, 199, 132, 0.30), transparent 30%),
        var(--bg);
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0 18px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mascot {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
      font-size: 31px;
      flex: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.15;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: clamp(14px, 2.1vw, 17px);
    }

    .small-button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 15px;
      background: #fff;
      color: var(--muted);
      box-shadow: 0 7px 18px rgba(103, 74, 29, 0.12);
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
    }

    .card {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(234, 223, 207, 0.9);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .status {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 247, 229, 0.95), rgba(255,255,255,0.86));
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
      color: var(--muted);
      font-weight: 700;
      font-size: clamp(15px, 2.2vw, 18px);
    }

    .bar-wrap {
      height: 18px;
      background: #f5ead6;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #edd8ae;
    }

    .bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd54f, #ff9800);
      transition: width 240ms ease;
    }

    main {
      padding: 24px clamp(18px, 4vw, 34px) 30px;
    }

    .question-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--accent-strong);
      background: #fff4db;
      border: 1px solid #ffd58c;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .question {
      font-size: clamp(32px, 6.2vw, 56px);
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-align: center;
      margin: 10px 0 8px;
      word-break: keep-all;
    }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.6;
      margin: 0 0 24px;
    }

    .reading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.9em;
      min-height: 1.45em;
      padding: 0.05em 0.32em 0.08em;
      margin: 0 0.08em;
      color: #d35400;
      background: var(--reading-bg);
      border: 0.09em solid var(--reading-border);
      border-radius: 0.36em;
      box-shadow: inset 0 -0.08em 0 rgba(242, 185, 75, 0.30);
      font-size: 0.78em;
      line-height: 1.05;
      letter-spacing: 0.02em;
      vertical-align: 0.08em;
      white-space: nowrap;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .choices button {
      appearance: none;
      border: 2px solid var(--choice-border);
      border-radius: 22px;
      background: var(--choice);
      min-height: 78px;
      padding: 14px 12px;
      color: var(--ink);
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 900;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 8px 0 #e9b95b;
      transition: transform 80ms ease, box-shadow 80ms ease, background 120ms ease;
      touch-action: manipulation;
    }

    .choices button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #e9b95b;
    }

    .choices button.correct {
      background: #dff7e9;
      border-color: #77ca98;
      box-shadow: 0 8px 0 #6fbd8c;
    }

    .choices button.wrong {
      background: #ffe0df;
      border-color: #ef9a9a;
      box-shadow: 0 8px 0 #df7b7b;
    }

    .message {
      min-height: 50px;
      margin-top: 22px;
      padding: 12px 16px;
      border-radius: 18px;
      background: #f7f0e5;
      color: var(--muted);
      font-weight: 800;
      font-size: clamp(17px, 2.6vw, 22px);
      line-height: 1.45;
      text-align: center;
    }

    .message.good {
      color: var(--good);
      background: #e7f8ee;
    }

    .message.bad {
      color: var(--bad);
      background: #ffe9e8;
    }

    .message.clear {
      color: #7a4a00;
      background: #fff0b8;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .big-action {
      border: 0;
      border-radius: 999px;
      padding: 15px 24px;
      font-weight: 900;
      font-size: 18px;
      background: #ffb74d;
      color: #3f2a0d;
      box-shadow: 0 8px 0 #df8e23;
      cursor: pointer;
      touch-action: manipulation;
    }

    .big-action:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #df8e23;
    }

    .hidden { display: none !important; }

    .shake {
      animation: shake 220ms linear;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }

    .pop {
      animation: pop 240ms ease;
    }

    @keyframes pop {
      0% { transform: scale(0.97); }
      70% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @media (max-width: 620px) {
      .app { padding-left: 12px; padding-right: 12px; }
      header { align-items: flex-start; }
      .mascot { width: 46px; height: 46px; font-size: 27px; border-radius: 15px; }
      .choices { grid-template-columns: 1fr; }
      .choices button { min-height: 70px; }
      main { padding-bottom: 22px; }
      .question { font-size: clamp(30px, 8vw, 46px); }
    }

    @media (orientation: landscape) and (max-height: 760px) {
      .app { padding-top: 10px; padding-bottom: 10px; }
      header { margin-bottom: 10px; }
      main { padding-top: 16px; padding-bottom: 18px; }
      .question { font-size: clamp(30px, 5.2vw, 48px); }
      .choices button { min-height: 66px; }
      .message { margin-top: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <div class="mascot" aria-hidden="true">🚀</div>
        <div>
          <h1>3年生 漢字えらびクイズ</h1>
          <div class="subtitle">読みがなを見て、ぴったりの漢字をえらぼう</div>
        </div>
      </div>
      <button class="small-button" id="resetButton" type="button">はじめから</button>
    </header>

    <section class="card" id="card">
      <div class="status">
        <div class="status-row">
          <span id="progressText">正解 0 / 50</span>
          <span id="queueText">のこり 50問</span>
        </div>
        <div class="bar-wrap" aria-hidden="true">
          <div class="bar" id="bar"></div>
        </div>
      </div>

      <main>
        <div class="question-label" id="questionNumber">もんだい</div>
        <div class="question" id="questionText"></div>
        <p class="hint">囲みの読みがなに合う漢字・言葉をえらんでね。</p>
        <div class="choices" id="choices"></div>
        <div class="message" id="message">まずは1問目。落ち着いてえらぼう。</div>

        <div class="footer-actions">
          <button class="big-action hidden" id="nextButton" type="button">つぎへ</button>
          <button class="big-action hidden" id="retryButton" type="button">もう一回あそぶ</button>
        </div>
      </main>
    </section>
  </div>

  <script>
    const QUESTIONS = [
      { id: 1,  prompt: "<span class='reading'>せ</span>界中の海。", answer: "世" },
      { id: 2,  prompt: "<span class='reading'>よ</span>習をする。", answer: "予" },
      { id: 3,  prompt: "ゆうびん<span class='reading'>きょく</span>。", answer: "局" },
      { id: 4,  prompt: "<span class='reading'>あじ</span>がうすい。", answer: "味" },
      { id: 5,  prompt: "太<span class='reading'>よう</span>の光。", answer: "陽" },
      { id: 6,  prompt: "漢字の<span class='reading'>れん</span>習。", answer: "練" },
      { id: 7,  prompt: "<span class='reading'>あい</span>手のチーム。", answer: "相" },
      { id: 8,  prompt: "手に<span class='reading'>も</span>つ。", answer: "持" },
      { id: 9,  prompt: "友を<span class='reading'>たす</span>ける。", answer: "助" },
      { id: 10, prompt: "<span class='reading'>こ</span>上の月。", answer: "湖" },
      { id: 11, prompt: "文を<span class='reading'>く</span>切る。", answer: "区" },
      { id: 12, prompt: "お<span class='reading'>さけ</span>をのむ。", answer: "酒" },
      { id: 13, prompt: "英語の<span class='reading'>はつ</span>音。", answer: "発" },
      { id: 14, prompt: "木々の<span class='reading'>みどり</span>。", answer: "緑" },
      { id: 15, prompt: "川<span class='reading'>きし</span>に立つ。", answer: "岸" },
      { id: 16, prompt: "本の目<span class='reading'>じ</span>。", answer: "次" },
      { id: 17, prompt: "おきゃく<span class='reading'>さま</span>。", answer: "様" },
      { id: 18, prompt: "<span class='reading'>さ</span>ししめす。", answer: "指" },
      { id: 19, prompt: "<span class='reading'>おもて</span>の門。", answer: "表" },
      { id: 20, prompt: "<span class='reading'>さか</span>道を行く。", answer: "坂" },
      { id: 21, prompt: "ごみを<span class='reading'>ひろ</span>う。", answer: "拾" },
      { id: 22, prompt: "<span class='reading'>しん</span>海にすむ魚。", answer: "深" },
      { id: 23, prompt: "答えを<span class='reading'>と</span>う。", answer: "問" },
      { id: 24, prompt: "<span class='reading'>ゆう</span>園地。", answer: "遊" },
      { id: 25, prompt: "<span class='reading'>かい</span>店時間。", answer: "開" },
      { id: 26, prompt: "心に<span class='reading'>かん</span>じる。", answer: "感" },
      { id: 27, prompt: "<span class='reading'>てつ</span>分をとる。", answer: "鉄" },
      { id: 28, prompt: "海の流<span class='reading'>ひょう</span>。", answer: "氷" },
      { id: 29, prompt: "<span class='reading'>けっ</span>心がつく。", answer: "決" },
      { id: 30, prompt: "名前の<span class='reading'>ゆ</span>来。", answer: "由" },
      { id: 31, prompt: "服の<span class='reading'>せい</span>理。", answer: "整" },
      { id: 32, prompt: "古い<span class='reading'>やかた</span>。", answer: "館" },
      { id: 33, prompt: "畑の作<span class='reading'>もつ</span>。", answer: "物" },
      { id: 34, prompt: "駅に<span class='reading'>つ</span>く。", answer: "着" },
      { id: 35, prompt: "水<span class='reading'>えい</span>大会。", answer: "泳" },
      { id: 36, prompt: "<span class='reading'>おう</span>断歩道。", answer: "横" },
      { id: 37, prompt: "本の<span class='reading'>だい</span>名。", answer: "題" },
      { id: 38, prompt: "大<span class='reading'>じ</span>な話。", answer: "事" },
      { id: 39, prompt: "<span class='reading'>とう</span>場する。", answer: "登" },
      { id: 40, prompt: "<span class='reading'>どう</span>話を読む。", answer: "童" },
      { id: 41, prompt: "<span class='reading'>たいら</span>な面。", answer: "平ら" },
      { id: 42, prompt: "<span class='reading'>かなしい</span>話。", answer: "悲しい" },
      { id: 43, prompt: "やさいが<span class='reading'>やすい</span>。", answer: "安い" },
      { id: 44, prompt: "首を<span class='reading'>あたためる</span>。", answer: "温める" },
      { id: 45, prompt: "学校へ<span class='reading'>むかう</span>。", answer: "向かう" },
      { id: 46, prompt: "いすを<span class='reading'>はこぶ</span>。", answer: "運ぶ" },
      { id: 47, prompt: "はがきを<span class='reading'>おくる</span>。", answer: "送る" },
      { id: 48, prompt: "日時を<span class='reading'>さだめる</span>。", answer: "定める" },
      { id: 49, prompt: "王さまに<span class='reading'>つかえる</span>。", answer: "仕える" },
      { id: 50, prompt: "<span class='reading'>まったく</span>知らない。", answer: "全く" }
    ];

    const TOTAL = QUESTIONS.length;
    const STORAGE_KEY = "kanjiQuizGrade3_v2";
    const encouragements = [
      "いいね、その調子！",
      "正解！しっかり見つけたね。",
      "やったね！一歩前進。",
      "すばらしい。次もいこう。",
      "ナイス！よく読めてるよ。"
    ];

    let queue = [];
    let solvedIds = new Set();
    let current = null;
    let locked = false;
    let attempts = 0;
    let misses = 0;

    const questionText = document.getElementById("questionText");
    const choicesEl = document.getElementById("choices");
    const messageEl = document.getElementById("message");
    const progressText = document.getElementById("progressText");
    const queueText = document.getElementById("queueText");
    const bar = document.getElementById("bar");
    const questionNumber = document.getElementById("questionNumber");
    const nextButton = document.getElementById("nextButton");
    const retryButton = document.getElementById("retryButton");
    const resetButton = document.getElementById("resetButton");
    const card = document.getElementById("card");

    function shuffle(array) {
      const a = array.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function saveState() {
      const data = {
        queueIds: queue.map(q => q.id),
        solvedIds: Array.from(solvedIds),
        currentId: current ? current.id : null,
        attempts,
        misses
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        const byId = new Map(QUESTIONS.map(q => [q.id, q]));
        solvedIds = new Set((data.solvedIds || []).filter(id => byId.has(id)));
        queue = (data.queueIds || []).map(id => byId.get(id)).filter(Boolean);
        current = data.currentId ? byId.get(data.currentId) : null;
        attempts = data.attempts || 0;
        misses = data.misses || 0;

        if (solvedIds.size >= TOTAL) return false;
        if (current && !solvedIds.has(current.id)) queue.unshift(current);
        current = null;

        const unsolvedNotQueued = QUESTIONS.filter(q =>
          !solvedIds.has(q.id) && !queue.some(item => item.id === q.id)
        );
        queue.push(...shuffle(unsolvedNotQueued));
        return queue.length > 0;
      } catch {
        return false;
      }
    }

    function startNewGame() {
      queue = shuffle(QUESTIONS);
      solvedIds = new Set();
      current = null;
      locked = false;
      attempts = 0;
      misses = 0;
      localStorage.removeItem(STORAGE_KEY);
      message("まずは1問目。落ち着いてえらぼう。", "");
      retryButton.classList.add("hidden");
      nextButton.classList.add("hidden");
      showNextQuestion();
    }

    function updateStatus() {
      const solved = solvedIds.size;
      progressText.textContent = `正解 ${solved} / ${TOTAL}`;
      queueText.textContent = `のこり ${Math.max(TOTAL - solved, 0)}問`;
      bar.style.width = `${(solved / TOTAL) * 100}%`;
    }

    function makeChoices(answer) {
      const allAnswers = QUESTIONS.map(q => q.answer);
      const others = allAnswers.filter(a => a !== answer);
      return shuffle([answer, ...shuffle(others).slice(0, 4)]);
    }

    function message(text, type) {
      messageEl.textContent = text;
      messageEl.className = "message";
      if (type) messageEl.classList.add(type);
    }

    function showNextQuestion() {
      locked = false;
      nextButton.classList.add("hidden");
      retryButton.classList.add("hidden");
      card.classList.remove("shake", "pop");

      if (solvedIds.size >= TOTAL) {
        clearGame();
        return;
      }

      current = queue.shift();

      while (current && solvedIds.has(current.id)) {
        current = queue.shift();
      }

      if (!current) {
        const rest = QUESTIONS.filter(q => !solvedIds.has(q.id));
        queue = shuffle(rest);
        current = queue.shift();
      }

      questionNumber.textContent = `もんだい ${current.id}`;
      questionText.innerHTML = current.prompt;
      choicesEl.innerHTML = "";

      const choices = makeChoices(current.answer);
      for (const choice of choices) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = choice;
        button.addEventListener("click", () => answer(choice, button));
        choicesEl.appendChild(button);
      }

      updateStatus();
      saveState();
    }

    function answer(choice, button) {
      if (locked || !current) return;
      locked = true;
      attempts++;

      const buttons = Array.from(choicesEl.querySelectorAll("button"));
      buttons.forEach(b => b.disabled = true);

      if (choice === current.answer) {
        solvedIds.add(current.id);
        button.classList.add("correct");
        card.classList.add("pop");
        message(encouragements[Math.floor(Math.random() * encouragements.length)], "good");
        updateStatus();
        saveState();

        window.setTimeout(() => {
          showNextQuestion();
        }, 650);
      } else {
        misses++;
        queue.push(current);
        button.classList.add("wrong");
        const correctButton = buttons.find(b => b.textContent === current.answer);
        if (correctButton) correctButton.classList.add("correct");
        card.classList.add("shake");
        message(`ざんねん。答えは「${current.answer}」。この問題はあとでもう一回出るよ。`, "bad");
        updateStatus();
        saveState();

        window.setTimeout(() => {
          showNextQuestion();
        }, 1250);
      }
    }

    function clearGame() {
      current = null;
      choicesEl.innerHTML = "";
      questionNumber.textContent = "クリア！";
      questionText.innerHTML = "ぜんぶ正解！";
      message(`おめでとう！ 50問クリアです。チャレンジ回数 ${attempts}回、まちがい ${misses}回。`, "clear");
      retryButton.classList.remove("hidden");
      nextButton.classList.add("hidden");
      updateStatus();
      localStorage.removeItem(STORAGE_KEY);
    }

    resetButton.addEventListener("click", () => {
      if (confirm("さいしょから始めますか？")) startNewGame();
    });

    retryButton.addEventListener("click", startNewGame);

    if (loadState()) {
      message("前のつづきから始めるね。", "");
      showNextQuestion();
    } else {
      startNewGame();
    }
  </script>
</body>
</html>
